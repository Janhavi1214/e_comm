# Server Configuration
server.port=8080
server.servlet.context-path=/
spring.application.name=ecommerce-app

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=ecommerce_user
spring.datasource.password=strong_password_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA/Hibernate Configuration
# IMPORTANT: Remove dialect - let Hibernate 7.2.1 auto-detect!
spring.jpa.hibernate.ddl-auto=update
# ddl-auto options:
# - create: Creates tables (drops existing ones)
# - update: Creates/modifies tables as needed (SAFE for development)
# - validate: Only validates, doesn't modify
# - none: No action

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.ecommerce=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# View Resolution (JSP)
# View Resolution (JSP)
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false